[project]
name = "mcp-common"
version = "0.3.0"
description = "Common Python utilities shared across Magic Gateway Protocol (MGP) servers."
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [
  { name = "ClotoCore Project", email = "ClotoCore@proton.me" },
]
dependencies = [
  # `mcp_common.mgp_utils` performs deferred runtime imports of
  # `mcp.shared.message` / `mcp.types` inside its async helpers, so the
  # `mcp` package is a hard runtime dependency for any consumer that uses
  # `mgp_utils`. The other foundation modules (validation / isolation /
  # no_persist) are stdlib-only, but a single declared dep is simpler than
  # split optional-extras for now.
  "mcp>=1.0",
  # `mcp_common.embedding_client` / `semantic_cache` / `search` perform
  # async HTTP calls via `httpx`. `embedding_client._embed_via_api` also
  # lazily imports `numpy` for L2-normalization when `mode="api"`; numpy
  # is not declared here because callers using `mode="http"` (the common
  # path) do not need it. Callers selecting `mode="api"` are responsible
  # for installing numpy themselves (typically via the consuming server's
  # own dependency set).
  "httpx>=0.27",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mcp_common"]
